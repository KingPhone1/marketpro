<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">MP</title>
  <desc id="desc">Logo de MarketPro con monograma MP dorado</desc>
  <defs>
    <linearGradient id="panel" x1="18" y1="12" x2="102" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#222522"/>
      <stop offset=".48" stop-color="#101211"/>
      <stop offset="1" stop-color="#050605"/>
    </linearGradient>
    <linearGradient id="gold" x1="26" y1="27" x2="92" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff3bd"/>
      <stop offset=".32" stop-color="#f1c35d"/>
      <stop offset=".72" stop-color="#c7912e"/>
      <stop offset="1" stop-color="#7b5518"/>
    </linearGradient>
    <linearGradient id="edge" x1="16" y1="10" x2="106" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff0b4" stop-opacity=".88"/>
      <stop offset=".42" stop-color="#c79532" stop-opacity=".34"/>
      <stop offset="1" stop-color="#f8d77a" stop-opacity=".16"/>
    </linearGradient>
    <radialGradient id="glow" cx="36%" cy="24%" r="72%">
      <stop offset="0" stop-color="#ffe39b" stop-opacity=".34"/>
      <stop offset=".48" stop-color="#c99532" stop-opacity=".12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="letterGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="1.25" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95  0 1 0 0 0.72  0 0 1 0 0.26  0 0 0 .8 0" result="goldBlur"/>
      <feMerge>
        <feMergeNode in="goldBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="104" height="104" rx="28" fill="url(#panel)" filter="url(#shadow)"/>
  <rect x="8" y="8" width="104" height="104" rx="28" fill="url(#glow)"/>
  <rect x="10.5" y="10.5" width="99" height="99" rx="25.5" fill="none" stroke="url(#edge)" stroke-width="2"/>
  <text x="60" y="76" text-anchor="middle" fill="url(#gold)" filter="url(#letterGlow)"
    font-family="Arial Black, Segoe UI Black, Inter, Arial, sans-serif" font-size="42" font-weight="900"
    letter-spacing="-4">MP</text>
  <text x="60" y="76" text-anchor="middle" fill="none" stroke="#fff3bd" stroke-opacity=".16" stroke-width="1.1"
    font-family="Arial Black, Segoe UI Black, Inter, Arial, sans-serif" font-size="42" font-weight="900"
    letter-spacing="-4">MP</text>
  <path d="M25 96h43.4c14.2 0 26.2-5.2 35.8-15.5" fill="none" stroke="#f1c35d" stroke-width="3.4" stroke-linecap="round" opacity=".72"/>
  <path d="M25 23c18.5-6.4 38.5-7 60-1.8" fill="none" stroke="#fff3bd" stroke-width="2.2" stroke-linecap="round" opacity=".38"/>
</svg>
